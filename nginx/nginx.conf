worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ---------- Logging ----------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ---------- Performance ----------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # ---------- Gzip ----------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/x-javascript image/svg+xml;

    # ---------- Security headers (global) ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---------- Rate limiting zones ----------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=10r/s;

    # ---------- Upstreams ----------
    upstream atria_web {
        server atria-web:8080;
    }

    upstream atria_api {
        server atria-api:3001;
    }

    upstream dify_api {
        server dify-api:5001;
    }

    upstream dify_web {
        server dify-web:3000;
    }

    # ---------- SERVIDOR 1: atria.netwise.com.br (App Principal) ----------
    server {
        listen 80;
        server_name atria.netwise.com.br nginx.netwise.com.br _; # _ é fallback

        # --- Atria API & Auth ---
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://atria_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Dify App Engine (Backend do Chat) ---
        location /dify/ {
            limit_req zone=chat_limit burst=10 nodelay;
            proxy_pass http://dify_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 300s;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
        }

        # --- Frontend Atria ---
        location / {
            proxy_pass http://atria_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' ws: wss:; frame-src 'self';" always;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://atria_web;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ---------- SERVIDOR 2: database.netwise.com.br (Painel Dify) ----------
    server {
        listen 80;
        server_name database.netwise.com.br;

        location / {
            # --- Anti-Cache & Branding Force ---
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header X-Branding-Filter-Active "true" always;
            
            # Injection
            sub_filter '<head>' '<head><link rel="stylesheet" href="/atria-custom/atria_branding.css">';
            sub_filter '<body>' '<body><script src="/atria-custom/atria_branding.js"></script>';
            
            # Text Swaps
            sub_filter 'Dify' 'atrIA';
            sub_filter 'dify' 'atria';
            sub_filter 'Powered by' 'Powered by atrIA';
            sub_filter '<span>Dify' '<span>atrIA';
            sub_filter '>Dify' '>atrIA';
            
            sub_filter_once off;
            sub_filter_types *;

            proxy_pass http://dify_web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Disable compression for sub_filter
            proxy_set_header Accept-Encoding "";
            proxy_hide_header Content-Encoding;
        }

        # --- Serve Custom Branding Assets ---
        location /atria-custom/ {
            alias /etc/nginx/custom/;
            add_header Content-Type text/css;
        }

        location /_next/ {
            proxy_pass http://dify_web/_next/;
            proxy_set_header Host $host;
        }

        location /dify-api/ {
            proxy_pass http://dify_api/;
            proxy_set_header Host $host;
        }
    }
}
