# ============================================================
# atrIA — Docker Compose (Full Stack)
# ============================================================
# Usage:
#   cp .env.example .env  (edit values)
#   docker compose -f docker-compose.full.yml up -d
# ============================================================

x-shared-env: &shared-env
  POSTGRES_USER: ${POSTGRES_USER:-atria}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atriadev123}
  POSTGRES_DB: ${POSTGRES_DB:-atria}
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-atriadev123}

services:
  # ========================
  # Infrastructure
  # ========================

  postgres:
    image: postgres:15-alpine
    container_name: atria-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atriadev123}
      POSTGRES_DB: ${POSTGRES_DB:-atria}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atria}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atria-network

  redis:
    image: redis:7-alpine
    container_name: atria-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-atriadev123} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-atriadev123}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atria-network

  chromadb:
    image: chromadb/chroma:latest
    container_name: atria-chromadb
    restart: unless-stopped
    volumes:
      - chromadb_data:/data
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - atria-network

  # ========================
  # Atria Application
  # ========================

  atria-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: atria-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *shared-env
      JWT_SECRET: ${ATRIA_JWT_SECRET:-atria-jwt-secret-change-me}
      JWT_EXPIRATION: ${ATRIA_JWT_EXPIRATION:-7d}
      BCRYPT_ROUNDS: ${ATRIA_BCRYPT_ROUNDS:-12}
      PORT: "3001"
      DIFY_API_URL: https://cronnos.netwise.com.br/v1
      DIFY_API_KEY: ${DIFY_API_KEY:-app-change-me}
      # --- SMTP ---
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-atrIA <noreply@atria.local>}
      # --- Rate Limiting ---
      RATE_LIMIT_WINDOW_MS: "900000"
      RATE_LIMIT_MAX: "100"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - atria-network

  atria-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_SELF_HOSTED: "true"
        VITE_APP_NAME: atrIA
    container_name: atria-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - atria-api
    networks:
      - atria-network

  # ========================
  # Nginx (unified proxy)
  # ========================

  nginx:
    image: nginx:alpine
    container_name: atria-nginx
    restart: unless-stopped
    depends_on:
      - atria-web
      - atria-api
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/custom:/etc/nginx/custom:ro
    networks:
      - atria-network

  # ========================
  # Nginx Proxy Manager (Visual UI)
  # ========================

  npm:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: atria-npm
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    networks:
      - atria-network
    extra_hosts:
      - "cronos.netwise.com.br:127.0.0.1"
      - "database.netwise.com.br:127.0.0.1"
      - "nginx.netwise.com.br:127.0.0.1"

volumes:
  postgres_data:
  redis_data:
  chromadb_data:
  dify_storage:
  atria_npm_data:
  atria_npm_letsencrypt:


networks:
  atria-network:
    driver: bridge
