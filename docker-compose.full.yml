# ============================================================
# atrIA — Docker Compose (Full Stack)
# ============================================================
# Usage:
#   cp .env.example .env  (edit values)
#   docker compose -f docker-compose.full.yml up -d
# ============================================================

x-shared-env: &shared-env
  POSTGRES_USER: ${POSTGRES_USER:-atria}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atriadev123}
  POSTGRES_DB: ${POSTGRES_DB:-atria}
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-atriadev123}

services:
  # ========================
  # Infrastructure
  # ========================

  postgres:
    image: postgres:15-alpine
    container_name: atria-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atriadev123}
      POSTGRES_DB: ${POSTGRES_DB:-atria}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atria}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atria-network

  redis:
    image: redis:7-alpine
    container_name: atria-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-atriadev123} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-atriadev123}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atria-network

  chromadb:
    image: chromadb/chroma:latest
    container_name: atria-chromadb
    restart: unless-stopped
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat" ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - atria-network

  # ========================
  # Dify Engine
  # ========================

  dify-api:
    image: langgenius/dify-api:latest
    container_name: atria-dify-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    environment:
      <<: *shared-env
      # --- Dify Core ---
      SECRET_KEY: ${DIFY_SECRET_KEY:-sk-atriasecretkey2025}
      DEPLOY_ENV: PRODUCTION
      MIGRATION_ENABLED: "true"
      CONSOLE_API_URL: ""
      CONSOLE_WEB_URL: ""
      SERVICE_API_URL: ""
      APP_WEB_URL: ""
      FILES_URL: ""
      # --- Database ---
      DB_USERNAME: ${POSTGRES_USER:-atria}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-atriadev123}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${POSTGRES_DB:-atria}
      # --- Redis ---
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-atriadev123}
      REDIS_DB: "0"
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-atriadev123}@redis:6379/1
      # --- Vector Store (ChromaDB) ---
      VECTOR_STORE: chroma
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      # --- Storage ---
      STORAGE_TYPE: opendal
      OPENDAL_SCHEME: fs
      OPENDAL_FS_ROOT: storage
      # --- Server ---
      DIFY_PORT: "5001"
      SERVER_WORKER_AMOUNT: "1"
      # --- CORS ---
      WEB_API_CORS_ALLOW_ORIGINS: "*"
      CONSOLE_CORS_ALLOW_ORIGINS: "*"
    volumes:
      - dify_storage:/app/api/storage
    networks:
      - atria-network

  dify-worker:
    image: langgenius/dify-api:latest
    container_name: atria-dify-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *shared-env
      SECRET_KEY: ${DIFY_SECRET_KEY:-sk-atriasecretkey2025}
      DEPLOY_ENV: PRODUCTION
      MODE: worker
      DB_USERNAME: ${POSTGRES_USER:-atria}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-atriadev123}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${POSTGRES_DB:-atria}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-atriadev123}
      REDIS_DB: "0"
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-atriadev123}@redis:6379/1
      VECTOR_STORE: chroma
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      STORAGE_TYPE: opendal
      OPENDAL_SCHEME: fs
      OPENDAL_FS_ROOT: storage
    volumes:
      - dify_storage:/app/api/storage
    networks:
      - atria-network

  dify-web:
    image: langgenius/dify-web:latest
    container_name: atria-dify-web
    restart: unless-stopped
    depends_on:
      - dify-api
    environment:
      CONSOLE_API_URL: ""
      APP_API_URL: ""
      NEXT_PUBLIC_DEPLOY_ENV: PRODUCTION
      NEXT_PUBLIC_EDITION: SELF_HOSTED
      NEXT_PUBLIC_API_PREFIX: /dify-api/console/api
      NEXT_PUBLIC_PUBLIC_API_PREFIX: /dify-api/api
    networks:
      - atria-network

  # ========================
  # Atria Application
  # ========================

  atria-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: atria-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *shared-env
      JWT_SECRET: ${ATRIA_JWT_SECRET:-atria-jwt-secret-change-me}
      JWT_EXPIRATION: ${ATRIA_JWT_EXPIRATION:-7d}
      BCRYPT_ROUNDS: ${ATRIA_BCRYPT_ROUNDS:-12}
      PORT: "3001"
      DIFY_API_URL: http://dify-api:5001/v1
      DIFY_API_KEY: ${DIFY_API_KEY:-app-change-me}
      # --- SMTP ---
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-atrIA <noreply@atria.local>}
      # --- Rate Limiting ---
      RATE_LIMIT_WINDOW_MS: "900000"
      RATE_LIMIT_MAX: "100"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - atria-network

  atria-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_DIFY_API_URL: /dify/v1
        VITE_APP_NAME: atrIA
    container_name: atria-web
    restart: unless-stopped
    depends_on:
      - atria-api
      - dify-api
    networks:
      - atria-network

  # ========================
  # Nginx (unified proxy)
  # ========================

  nginx:
    image: nginx:alpine
    container_name: atria-nginx
    restart: unless-stopped
    depends_on:
      - atria-web
      - atria-api
      - dify-api
      - dify-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - atria-network

volumes:
  postgres_data:
  redis_data:
  chromadb_data:
  dify_storage:


networks:
  atria-network:
    driver: bridge
